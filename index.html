<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FieldOps Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'DM Sans', system-ui, sans-serif; }
    .syne { font-family: 'Syne', sans-serif; }
    .card { background: #080f20; border: 1px solid #1e293b; border-radius: 12px; }
    .status-badge { padding: 4px 12px; border-radius: 9999px; font-size: 10px; font-weight: 800; letter-spacing: 0.5px; }
    .modal { animation: modalPop 0.2s ease-out forwards; }
    @keyframes modalPop {
      from { opacity: 0; transform: scale(0.95) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body class="bg-[#030810] text-slate-200 min-h-screen">

  <nav class="bg-[#050d1a] border-b border-slate-800 py-3 px-6 flex items-center justify-between sticky top-0 z-50">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 bg-gradient-to-br from-blue-600 to-violet-600 rounded-xl flex items-center justify-center text-xl">⚡</div>
      <div>
        <div class="syne text-2xl font-black tracking-tighter">FieldOps Pro</div>
        <div class="text-[10px] text-slate-500 tracking-[1px] uppercase">Facilities Management</div>
      </div>
    </div>

    <div class="flex gap-8 text-sm font-medium" id="tabs">
      <a href="#" data-tab="dashboard" class="tab-link text-blue-400">Dashboard</a>
      <a href="#" data-tab="jobs" class="tab-link">All Jobs</a>
      <a href="#" data-tab="sites" class="tab-link">Sites</a>
      <a href="#" data-tab="settings" class="tab-link">Settings</a>
    </div>
  </nav>

  <div class="p-6">

    <!-- Dashboard -->
    <div id="dashboard" class="tab-content active">
      <div class="max-w-7xl mx-auto">
        <h1 class="syne text-4xl font-black mb-8">Operations Overview</h1>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-12" id="stats"></div>
        <h2 class="text-2xl font-semibold mb-6">Recent Jobs</h2>
        <div class="grid gap-4" id="recent-jobs"></div>
      </div>
    </div>

    <!-- All Jobs -->
    <div id="jobs" class="tab-content">
      <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-6">
          <h1 class="syne text-3xl font-black">All Jobs</h1>
          <button onclick="openNewJobModal()" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-2xl text-sm font-medium">+ New Job</button>
        </div>
        <div class="grid gap-4" id="all-jobs-list"></div>
      </div>
    </div>

    <!-- Sites -->
    <div id="sites" class="tab-content">
      <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-6">
          <h1 class="syne text-3xl font-black">Sites</h1>
          <button onclick="openSiteModal()" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-2xl text-sm font-medium">+ New Site</button>
        </div>

        <div class="card p-4 mb-6">
          <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <input id="site-search" placeholder="Search name / postcode / number" class="w-full bg-[#0a1628] border border-slate-700 rounded-xl p-4">
            <select id="site-type-filter" class="w-full bg-[#0a1628] border border-slate-700 rounded-xl p-4">
              <option value="">All types</option>
              <option value="retail">Retail</option>
              <option value="els">ELS</option>
              <option value="els_private">ELS Private</option>
              <option value="cobra">Cobra</option>
              <option value="wenzels">Wenzel's</option>
              <option value="projects">Projects</option>
            </select>
            <select id="site-active-filter" class="w-full bg-[#0a1628] border border-slate-700 rounded-xl p-4">
              <option value="">All statuses</option>
              <option value="true">Active</option>
              <option value="false">Inactive</option>
            </select>
            <button onclick="applySiteFilters()" class="bg-slate-700 hover:bg-slate-600 rounded-xl px-4 py-3">Apply Filters</button>
          </div>
        </div>

        <div class="grid gap-4" id="sites-list"></div>
      </div>
    </div>

    <!-- Settings -->
    <div id="settings" class="tab-content">
      <div class="max-w-6xl mx-auto">
        <h1 class="syne text-3xl font-black mb-8">Master Data</h1>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
          <div class="card p-6">
            <h2 class="font-semibold mb-4 flex justify-between">
              Clients
              <button onclick="addMasterItem('clients')" class="text-blue-400 text-sm">+ Add</button>
            </h2>
            <div id="clients-list" class="space-y-3"></div>
          </div>

          <div class="card p-6">
            <h2 class="font-semibold mb-4 flex justify-between">
              Subcontractors
              <button onclick="addMasterItem('subcontractors')" class="text-blue-400 text-sm">+ Add</button>
            </h2>
            <div id="subcontractors-list" class="space-y-3"></div>
          </div>

          <div class="card p-6">
            <h2 class="font-semibold mb-4 flex justify-between">
              Engineers
              <button onclick="addMasterItem('engineers')" class="text-blue-400 text-sm">+ Add</button>
            </h2>
            <div id="engineers-list" class="space-y-3"></div>
          </div>

          <div class="card p-6">
            <h2 class="font-semibold mb-4 flex justify-between">
              Vehicles
              <button onclick="addMasterItem('vehicles')" class="text-blue-400 text-sm">+ Add</button>
            </h2>
            <div id="vehicles-list" class="space-y-3"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Job Detail Modal -->
  <div id="job-detail-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100] p-4">
    <div class="modal bg-[#080f20] border border-slate-700 rounded-2xl w-full max-w-4xl max-h-[92vh] overflow-hidden flex flex-col">
      <div class="border-b border-slate-700 px-8 py-5 flex items-center justify-between">
        <div>
          <div id="modal-job-id" class="font-mono text-xs text-slate-500"></div>
          <div id="modal-title" class="text-2xl font-semibold syne"></div>
        </div>
        <button onclick="closeJobModal()" class="text-3xl text-slate-400 hover:text-white">×</button>
      </div>
      <div class="flex-1 overflow-auto p-8" id="job-modal-body"></div>
      <div class="border-t border-slate-700 px-8 py-5 flex justify-end gap-3">
        <button onclick="closeJobModal()" class="px-6 py-2.5 text-slate-400">Close</button>
        <button onclick="dispatchToSub()" class="bg-purple-600 hover:bg-purple-700 px-6 py-2.5 rounded-xl">Dispatch to Subcontractor</button>
      </div>
    </div>
  </div>

  <!-- New Job Modal -->
  <div id="new-job-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100] p-4">
    <div class="modal bg-[#080f20] border border-slate-700 rounded-2xl w-full max-w-lg p-8">
      <h3 class="text-xl font-semibold mb-6">New Job</h3>
      <div class="space-y-4">
        <input id="job-title" placeholder="Job Title" class="w-full bg-[#0a1628] border border-slate-700 rounded-xl p-4">
        <select id="job-client" class="w-full bg-[#0a1628] border border-slate-700 rounded-xl p-4"></select>
        <select id="job-priority" class="w-full bg-[#0a1628] border border-slate-700 rounded-xl p-4">
          <option value="P1">P1 - Emergency</option>
          <option value="P2" selected>P2 - High</option>
          <option value="P3">P3 - Normal</option>
          <option value="P4">P4 - Low</option>
          <option value="P5">P5 - Planned</option>
        </select>
        <input id="job-location" placeholder="Location" class="w-full bg-[#0a1628] border border-slate-700 rounded-xl p-4">
        <textarea id="job-description" rows="4" placeholder="Description" class="w-full bg-[#0a1628] border border-slate-700 rounded-xl p-4"></textarea>
      </div>
      <div class="flex gap-3 mt-8">
        <button onclick="closeNewJobModal()" class="flex-1 py-3 text-slate-400">Cancel</button>
        <button onclick="createNewJob()" class="flex-1 py-3 bg-blue-600 hover:bg-blue-700 rounded-xl">Create Job</button>
      </div>
    </div>
  </div>

  <!-- Site Modal -->
  <div id="site-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100] p-4">
    <div class="modal bg-[#080f20] border border-slate-700 rounded-2xl w-full max-w-3xl p-8 max-h-[92vh] overflow-auto">
      <h3 id="site-modal-title" class="text-xl font-semibold mb-6">New Site</h3>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input id="site-name" placeholder="Site Name" class="w-full bg-[#0a1628] border border-slate-700 rounded-xl p-4">
        <input id="site-number" placeholder="Site Number / Branch Code" class="w-full bg-[#0a1628] border border-slate-700 rounded-xl p-4">

        <select id="site-type" class="w-full bg-[#0a1628] border border-slate-700 rounded-xl p-4">
          <option value="retail">Retail</option>
          <option value="els">ELS</option>
          <option value="els_private">ELS Private</option>
          <option value="cobra">Cobra</option>
          <option value="wenzels">Wenzel's</option>
          <option value="projects">Projects</option>
        </select>

        <input id="site-client" placeholder="Client" class="w-full bg-[#0a1628] border border-slate-700 rounded-xl p-4">

        <input id="site-postcode" placeholder="Postcode" class="w-full bg-[#0a1628] border border-slate-700 rounded-xl p-4">
        <input id="site-telephone" placeholder="Telephone" class="w-full bg-[#0a1628] border border-slate-700 rounded-xl p-4">

        <input id="site-address" placeholder="Address" class="w-full bg-[#0a1628] border border-slate-700 rounded-xl p-4 md:col-span-2">
        <input id="site-sharepoint" placeholder="SharePoint URL" class="w-full bg-[#0a1628] border border-slate-700 rounded-xl p-4 md:col-span-2">

        <input id="site-lat" placeholder="Latitude" class="w-full bg-[#0a1628] border border-slate-700 rounded-xl p-4">
        <input id="site-lng" placeholder="Longitude" class="w-full bg-[#0a1628] border border-slate-700 rounded-xl p-4">

        <input id="site-mileage" placeholder="Mileage from HQ" class="w-full bg-[#0a1628] border border-slate-700 rounded-xl p-4">
        <input id="site-travel-time" placeholder="Travel time from HQ (minutes)" class="w-full bg-[#0a1628] border border-slate-700 rounded-xl p-4">

        <label class="flex items-center gap-3 bg-[#0a1628] border border-slate-700 rounded-xl p-4">
          <input type="checkbox" id="site-active" checked class="w-4 h-4">
          <span>Active</span>
        </label>
      </div>

      <div class="flex gap-3 mt-6">
        <button onclick="closeSiteModal()" class="flex-1 py-3 text-slate-400">Cancel</button>
        <button onclick="saveSite()" class="flex-1 py-3 bg-blue-600 hover:bg-blue-700 rounded-xl">Save Site</button>
      </div>
    </div>
  </div>

  <!-- Master Data Modal -->
  <div id="master-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100] p-4">
    <div class="modal bg-[#080f20] border border-slate-700 rounded-2xl w-full max-w-md p-8">
      <h3 id="master-modal-title" class="text-xl font-semibold mb-6"></h3>
      <div id="master-modal-form" class="space-y-4"></div>
      <div class="flex gap-3 mt-8">
        <button onclick="closeMasterModal()" class="flex-1 py-3 text-slate-400">Cancel</button>
        <button onclick="saveMasterItem()" class="flex-1 py-3 bg-blue-600 hover:bg-blue-700 rounded-xl">Save</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="hidden fixed bottom-6 right-6 bg-blue-600 text-white px-6 py-3 rounded-2xl shadow-2xl z-[200]">
    <span id="toast-text"></span>
  </div>

  <script>
    const API_BASE = "https://fieldops-pro-worker.jamie-def.workers.dev";

    let currentMasterCollection = null;
    let currentMasterId = null;
    let currentJob = null;
    let currentSiteId = null;
    let jobs = [];
    let sites = [];
    let clientsCache = [];

    async function apiRequest(endpoint, method = "GET", body = null) {
      const opts = {
        method,
        headers: { "Content-Type": "application/json" }
      };

      if (body) opts.body = JSON.stringify(body);

      const res = await fetch(API_BASE + endpoint, opts);

      if (!res.ok) {
        const text = await res.text().catch(() => "");
        throw new Error(`API error ${res.status}: ${text}`);
      }

      const contentType = res.headers.get("content-type") || "";
      if (contentType.includes("application/json")) return res.json();
      return res.text();
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function showToast(msg) {
      const t = document.getElementById("toast");
      document.getElementById("toast-text").textContent = msg;
      t.classList.remove("hidden");
      setTimeout(() => t.classList.add("hidden"), 3000);
    }

    function getClientName(clientId) {
      const match = clientsCache.find(c => c.id === clientId);
      return match ? match.name : (clientId || "Unknown client");
    }

    function getPriorityClass(priority) {
      switch (priority) {
        case "P1": return "bg-red-900 text-red-300";
        case "P2": return "bg-orange-900 text-orange-300";
        case "P3": return "bg-amber-900 text-amber-300";
        case "P4": return "bg-blue-900 text-blue-300";
        case "P5": return "bg-slate-700 text-slate-200";
        default: return "bg-slate-800 text-slate-300";
      }
    }

    function normaliseSite(raw) {
      const clientRaw = (raw.client || raw.type || "").toString().toLowerCase();

      let type = clientRaw;
      if (!type) {
        if (raw["Branch Code"]) type = "els";
        else if ((raw.siteName || "").toLowerCase().includes("wenzel")) type = "wenzels";
        else type = "retail";
      }

      if (type === "els_private" || type === "els private" || type === "elsprivate") type = "els_private";

      const lat = raw.lat ?? raw.latitude ?? raw.Latitude ?? null;
      const lng = raw.lng ?? raw.lon ?? raw.longitude ?? raw.Longitude ?? null;

      return {
        id: raw.id || `SITE-${raw.siteNumber || raw["Branch Code"] || raw.siteName || Date.now()}`,
        client: raw.client || type,
        type,
        active: raw.active !== false,
        siteNumber: raw.siteNumber || raw["Branch Code"] || "",
        siteName: raw.siteName || raw["Store Name"] || "",
        postcode: raw.postcode || raw.Postcode || "",
        telephone: raw.telephone || raw.Telephone || "",
        address: raw.address || raw.address1 || raw.Address || raw["Address 1"] || raw.street || raw.Street || "",
        town: raw.town || raw.Town || "",
        county: raw.county || raw.County || "",
        sharepointURL: raw.sharepointURL || raw.sharePointURL || raw.SharePoint || "",
        lat: lat !== null && lat !== "" ? Number(lat) : null,
        lng: lng !== null && lng !== "" ? Number(lng) : null,
        mileageFromHQ: raw.mileageFromHQ !== undefined && raw.mileageFromHQ !== null && raw.mileageFromHQ !== "" ? Number(raw.mileageFromHQ) : null,
        travelTimeFromHQMinutes: raw.travelTimeFromHQMinutes !== undefined && raw.travelTimeFromHQMinutes !== null && raw.travelTimeFromHQMinutes !== "" ? Number(raw.travelTimeFromHQMinutes) : null,
        lastUpdated: raw.lastUpdated || raw.updatedAt || raw.createdAt || ""
      };
    }

    function denormaliseSite(site) {
      return {
        id: site.id,
        client: site.client || site.type,
        active: site.active,
        siteNumber: site.siteNumber,
        siteName: site.siteName,
        postcode: site.postcode,
        telephone: site.telephone,
        address1: site.address,
        lat: site.lat,
        lon: site.lng,
        mileageFromHQ: site.mileageFromHQ,
        sharepointURL: site.sharepointURL,
        travelTimeFromHQMinutes: site.travelTimeFromHQMinutes,
        lastUpdated: new Date().toISOString()
      };
    }

    async function loadJobs() {
      try {
        const data = await apiRequest("/api/jobs");
        jobs = Array.isArray(data) ? data : [];
        jobs.sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
        renderDashboard();
        renderAllJobs();
      } catch (e) {
        console.error("Failed to load jobs:", e);
        jobs = [];
        renderDashboard();
        renderAllJobs();
        showToast("Failed to load jobs");
      }
    }

    async function loadClientsCache() {
      try {
        const data = await apiRequest("/api/clients");
        clientsCache = Array.isArray(data) ? data : [];
      } catch (e) {
        clientsCache = [];
      }
    }

    async function loadSites() {
      try {
        const data = await apiRequest("/api/sites");
        const arr = Array.isArray(data) ? data : [];
        sites = arr.map(normaliseSite);
        sites.sort((a, b) => String(a.siteName || "").localeCompare(String(b.siteName || "")));
        renderSites();
      } catch (e) {
        console.error("Failed to load sites:", e);
        sites = [];
        renderSites();
        showToast("Failed to load sites");
      }
    }

    async function renderSettings() {
      const [clients, subs, engineers, vehicles] = await Promise.all([
        apiRequest("/api/clients").catch(() => []),
        apiRequest("/api/subcontractors").catch(() => []),
        apiRequest("/api/engineers").catch(() => []),
        apiRequest("/api/vehicles").catch(() => [])
      ]);

      clientsCache = Array.isArray(clients) ? clients : [];

      document.getElementById("clients-list").innerHTML = clientsCache.length
        ? clientsCache.map(c => `
          <div class="flex justify-between gap-4 bg-[#0a1628] p-4 rounded-xl">
            <div>
              <div class="font-medium">${escapeHtml(c.name)}</div>
              <div class="text-xs text-slate-400">${escapeHtml(c.email || "")}</div>
            </div>
            <div class="flex gap-3 shrink-0">
              <button onclick="editMasterItem('clients', '${c.id}')" class="text-blue-400">Edit</button>
              <button onclick="deleteMasterItem('clients', '${c.id}')" class="text-red-400">Delete</button>
            </div>
          </div>
        `).join("")
        : '<p class="text-slate-400 py-8 text-center">No clients yet</p>';

      document.getElementById("subcontractors-list").innerHTML = Array.isArray(subs) && subs.length
        ? subs.map(s => `
          <div class="flex justify-between gap-4 bg-[#0a1628] p-4 rounded-xl">
            <div>
              <div class="font-medium">${escapeHtml(s.name)}</div>
              <div class="text-xs text-slate-400">${escapeHtml(s.category || "")}</div>
            </div>
            <div class="flex gap-3 shrink-0">
              <button onclick="editMasterItem('subcontractors', '${s.id}')" class="text-blue-400">Edit</button>
              <button onclick="deleteMasterItem('subcontractors', '${s.id}')" class="text-red-400">Delete</button>
            </div>
          </div>
        `).join("")
        : '<p class="text-slate-400 py-8 text-center">No subcontractors yet</p>';

      document.getElementById("engineers-list").innerHTML = Array.isArray(engineers) && engineers.length
        ? engineers.map(e => `
          <div class="flex justify-between gap-4 bg-[#0a1628] p-4 rounded-xl">
            <div><div class="font-medium">${escapeHtml(e.name)}</div></div>
            <div class="flex gap-3 shrink-0">
              <button onclick="editMasterItem('engineers', '${e.id}')" class="text-blue-400">Edit</button>
              <button onclick="deleteMasterItem('engineers', '${e.id}')" class="text-red-400">Delete</button>
            </div>
          </div>
        `).join("")
        : '<p class="text-slate-400 py-8 text-center">No engineers yet</p>';

      document.getElementById("vehicles-list").innerHTML = Array.isArray(vehicles) && vehicles.length
        ? vehicles.map(v => `
          <div class="flex justify-between gap-4 bg-[#0a1628] p-4 rounded-xl">
            <div><div class="font-medium">${escapeHtml(v.name || v.registration || "")}</div></div>
            <div class="flex gap-3 shrink-0">
              <button onclick="editMasterItem('vehicles', '${v.id}')" class="text-blue-400">Edit</button>
              <button onclick="deleteMasterItem('vehicles', '${v.id}')" class="text-red-400">Delete</button>
            </div>
          </div>
        `).join("")
        : '<p class="text-slate-400 py-8 text-center">No vehicles yet</p>';
    }

    async function getMasterItem(coll, id) {
      return apiRequest(`/api/${coll}/${id}`);
    }

    function addMasterItem(coll) {
      currentMasterCollection = coll;
      currentMasterId = null;
      showMasterModal(coll, {});
    }

    async function editMasterItem(coll, id) {
      try {
        currentMasterCollection = coll;
        currentMasterId = id;
        const item = await getMasterItem(coll, id);
        showMasterModal(coll, item || {});
      } catch (e) {
        console.error(e);
        showToast("Failed to load item");
      }
    }

    function showMasterModal(coll, item) {
      const title = item.id ? `Edit ${coll}` : `Add ${coll}`;
      document.getElementById("master-modal-title").textContent = title;

      let formHTML = "";

      if (coll === "clients") {
        formHTML = `
          <input id="m-name" value="${escapeHtml(item.name || "")}" placeholder="Client Name" class="w-full bg-[#0a1628] border border-slate-700 rounded-xl p-4">
          <input id="m-contact" value="${escapeHtml(item.contact || "")}" placeholder="Contact" class="w-full bg-[#0a1628] border border-slate-700 rounded-xl p-4">
          <input id="m-email" value="${escapeHtml(item.email || "")}" placeholder="Email" class="w-full bg-[#0a1628] border border-slate-700 rounded-xl p-4">
        `;
      } else if (coll === "subcontractors") {
        formHTML = `
          <input id="m-name" value="${escapeHtml(item.name || "")}" placeholder="Company Name" class="w-full bg-[#0a1628] border border-slate-700 rounded-xl p-4">
          <input id="m-category" value="${escapeHtml(item.category || "")}" placeholder="Category" class="w-full bg-[#0a1628] border border-slate-700 rounded-xl p-4">
          <input id="m-email" value="${escapeHtml(item.email || "")}" placeholder="Email" class="w-full bg-[#0a1628] border border-slate-700 rounded-xl p-4">
        `;
      } else if (coll === "engineers") {
        formHTML = `
          <input id="m-name" value="${escapeHtml(item.name || "")}" placeholder="Engineer Name" class="w-full bg-[#0a1628] border border-slate-700 rounded-xl p-4">
        `;
      } else if (coll === "vehicles") {
        formHTML = `
          <input id="m-name" value="${escapeHtml(item.name || "")}" placeholder="Vehicle Name / Reg" class="w-full bg-[#0a1628] border border-slate-700 rounded-xl p-4">
        `;
      }

      document.getElementById("master-modal-form").innerHTML = formHTML;
      document.getElementById("master-modal").classList.remove("hidden");
    }

    function closeMasterModal() {
      document.getElementById("master-modal").classList.add("hidden");
    }

    async function saveMasterItem() {
      const coll = currentMasterCollection;
      const data = {};

      if (currentMasterId) data.id = currentMasterId;

      document.querySelectorAll("#master-modal-form input").forEach(input => {
        data[input.id.replace("m-", "")] = input.value.trim();
      });

      try {
        if (data.id) {
          await apiRequest(`/api/${coll}/${data.id}`, "PUT", data);
        } else {
          await apiRequest(`/api/${coll}`, "POST", data);
        }

        showToast("Saved successfully");
        closeMasterModal();
        await renderSettings();
      } catch (e) {
        console.error(e);
        showToast("Save failed");
      }
    }

    async function deleteMasterItem(coll, id) {
      if (!confirm("Delete this item?")) return;

      try {
        await apiRequest(`/api/${coll}/${id}`, "DELETE");
        showToast("Deleted");
        await renderSettings();
      } catch (e) {
        console.error(e);
        showToast("Delete failed");
      }
    }

    function openJobModalById(jobId) {
      const job = jobs.find(j => j.id === jobId);
      if (!job) return;
      openJobModal(job);
    }

    function openJobModal(job) {
      currentJob = job;
      document.getElementById("modal-job-id").textContent = job.id || "";
      document.getElementById("modal-title").textContent = job.title || "Untitled Job";

      const body = `
        <div class="grid md:grid-cols-2 gap-8">
          <div>
            <div class="flex gap-3 mb-6 flex-wrap">
              <span class="status-badge ${getPriorityClass(job.priority)}">${escapeHtml(job.priority || "N/A")}</span>
              <span class="status-badge bg-blue-900 text-blue-300">${escapeHtml(job.status || "pending")}</span>
            </div>

            <div class="space-y-6">
              <div>
                <div class="text-xs text-slate-400">CLIENT</div>
                <div class="font-medium">${escapeHtml(getClientName(job.clientId))}</div>
              </div>

              <div>
                <div class="text-xs text-slate-400">LOCATION</div>
                <div class="text-sm">${escapeHtml(job.location || "Not assigned")}</div>
              </div>

              <div>
                <div class="text-xs text-slate-400">ENGINEER</div>
                <div class="font-medium">${escapeHtml(job.engineer || "Unassigned")}</div>
              </div>

              <div>
                <div class="text-xs text-slate-400">CREATED</div>
                <div class="text-sm">${escapeHtml(job.createdAt ? new Date(job.createdAt).toLocaleString() : "Unknown")}</div>
              </div>
            </div>
          </div>

          <div>
            <div class="text-xs text-slate-400 mb-2">DESCRIPTION</div>
            <div class="bg-[#0a1628] p-5 rounded-xl border border-slate-700 text-sm whitespace-pre-wrap">
              ${escapeHtml(job.description || "No description")}
            </div>
          </div>
        </div>
      `;

      document.getElementById("job-modal-body").innerHTML = body;
      document.getElementById("job-detail-modal").classList.remove("hidden");
    }

    function closeJobModal() {
      document.getElementById("job-detail-modal").classList.add("hidden");
    }

    async function openNewJobModal() {
      document.getElementById("new-job-modal").classList.remove("hidden");

      try {
        const clients = await apiRequest("/api/clients");
        clientsCache = Array.isArray(clients) ? clients : [];
      } catch (e) {
        clientsCache = [];
      }

      const select = document.getElementById("job-client");
      select.innerHTML =
        '<option value="">Select Client...</option>' +
        clientsCache.map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join("");
    }

    function closeNewJobModal() {
      document.getElementById("new-job-modal").classList.add("hidden");
      document.getElementById("job-title").value = "";
      document.getElementById("job-client").value = "";
      document.getElementById("job-priority").value = "P2";
      document.getElementById("job-location").value = "";
      document.getElementById("job-description").value = "";
    }

    async function createNewJob() {
      const title = document.getElementById("job-title").value.trim();
      const clientId = document.getElementById("job-client").value;
      const priority = document.getElementById("job-priority").value;
      const description = document.getElementById("job-description").value.trim();
      const location = document.getElementById("job-location").value.trim();

      if (!title || !clientId) {
        showToast("Title and client required");
        return;
      }

      const newJob = {
        title,
        clientId,
        priority,
        status: "pending",
        description: description || "No description",
        createdAt: new Date().toISOString(),
        completionDeadline: new Date(Date.now() + 7 * 86400000).toISOString(),
        location: location || "To be assigned",
        engineer: "Unassigned"
      };

      try {
        const saved = await apiRequest("/api/jobs", "POST", newJob);
        jobs.unshift(saved);
        jobs.sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
        renderDashboard();
        renderAllJobs();
        closeNewJobModal();
        showToast("Job created");
      } catch (e) {
        console.error(e);
        showToast("Failed to create job");
      }
    }

    function renderSites(filtered = null) {
      const source = filtered || sites;

      document.getElementById("sites-list").innerHTML = source.length
        ? source.map(site => `
          <div class="card p-6">
            <div class="flex justify-between gap-4">
              <div>
                <div class="flex items-center gap-3 flex-wrap">
                  <div class="font-semibold text-lg">${escapeHtml(site.siteName || "")}</div>
                  <span class="status-badge bg-blue-900 text-blue-300">${escapeHtml(site.type || "unknown")}</span>
                  <span class="status-badge ${site.active ? 'bg-emerald-900 text-emerald-300' : 'bg-slate-700 text-slate-300'}">${site.active ? 'Active' : 'Inactive'}</span>
                </div>

                <div class="text-sm text-slate-400 mt-2">
                  ${escapeHtml(site.siteNumber || "")}${site.siteNumber ? ' · ' : ''}${escapeHtml(site.postcode || "")}
                </div>

                <div class="text-sm text-slate-400 mt-1">${escapeHtml(site.address || "")}</div>

                <div class="text-xs text-slate-500 mt-2">
                  GPS: ${site.lat ?? "—"}, ${site.lng ?? "—"}
                </div>

                <div class="text-xs text-slate-500">
                  Mileage from HQ: ${site.mileageFromHQ ?? "—"}
                </div>

                <div class="text-xs text-slate-500">
                  Travel time from HQ: ${site.travelTimeFromHQMinutes ?? "—"} mins
                </div>
              </div>

              <div class="flex gap-3 shrink-0 items-start">
                <button onclick="editSite('${site.id}')" class="text-blue-400">Edit</button>
                <button onclick="deleteSite('${site.id}')" class="text-red-400">Delete</button>
              </div>
            </div>
          </div>
        `).join("")
        : '<div class="card p-6 text-slate-400">No sites found</div>';
    }

    function applySiteFilters() {
      const q = document.getElementById("site-search").value.trim().toLowerCase();
      const type = document.getElementById("site-type-filter").value.trim().toLowerCase();
      const activeValue = document.getElementById("site-active-filter").value;

      let filtered = [...sites];

      if (type) {
        filtered = filtered.filter(s => (s.type || "").toLowerCase() === type);
      }

      if (activeValue !== "") {
        const isActive = activeValue === "true";
        filtered = filtered.filter(s => !!s.active === isActive);
      }

      if (q) {
        filtered = filtered.filter(s =>
          String(s.siteName || "").toLowerCase().includes(q) ||
          String(s.siteNumber || "").toLowerCase().includes(q) ||
          String(s.postcode || "").toLowerCase().includes(q) ||
          String(s.address || "").toLowerCase().includes(q)
        );
      }

      renderSites(filtered);
    }

    function openSiteModal(site = null) {
      currentSiteId = site ? site.id : null;

      document.getElementById("site-modal-title").textContent = site ? "Edit Site" : "New Site";
      document.getElementById("site-name").value = site?.siteName || "";
      document.getElementById("site-number").value = site?.siteNumber || "";
      document.getElementById("site-type").value = site?.type || "retail";
      document.getElementById("site-client").value = site?.client || site?.type || "";
      document.getElementById("site-postcode").value = site?.postcode || "";
      document.getElementById("site-telephone").value = site?.telephone || "";
      document.getElementById("site-address").value = site?.address || "";
      document.getElementById("site-sharepoint").value = site?.sharepointURL || "";
      document.getElementById("site-lat").value = site?.lat ?? "";
      document.getElementById("site-lng").value = site?.lng ?? "";
      document.getElementById("site-mileage").value = site?.mileageFromHQ ?? "";
      document.getElementById("site-travel-time").value = site?.travelTimeFromHQMinutes ?? "";
      document.getElementById("site-active").checked = site ? !!site.active : true;

      document.getElementById("site-modal").classList.remove("hidden");
    }

    function closeSiteModal() {
      document.getElementById("site-modal").classList.add("hidden");
    }

    async function editSite(id) {
      try {
        const raw = await apiRequest(`/api/sites/${id}`);
        const site = normaliseSite(raw);
        openSiteModal(site);
      } catch (e) {
        console.error(e);
        const fallback = sites.find(s => s.id === id);
        if (fallback) openSiteModal(fallback);
        else showToast("Failed to load site");
      }
    }

    async function saveSite() {
      const site = {
        id: currentSiteId || undefined,
        client: document.getElementById("site-client").value.trim() || document.getElementById("site-type").value,
        type: document.getElementById("site-type").value,
        active: document.getElementById("site-active").checked,
        siteNumber: document.getElementById("site-number").value.trim(),
        siteName: document.getElementById("site-name").value.trim(),
        postcode: document.getElementById("site-postcode").value.trim(),
        telephone: document.getElementById("site-telephone").value.trim(),
        address: document.getElementById("site-address").value.trim(),
        sharepointURL: document.getElementById("site-sharepoint").value.trim(),
        lat: document.getElementById("site-lat").value.trim(),
        lng: document.getElementById("site-lng").value.trim(),
        mileageFromHQ: document.getElementById("site-mileage").value.trim(),
        travelTimeFromHQMinutes: document.getElementById("site-travel-time").value.trim()
      };

      if (!site.siteName) {
        showToast("Site name required");
        return;
      }

      site.lat = site.lat === "" ? null : Number(site.lat);
      site.lng = site.lng === "" ? null : Number(site.lng);
      site.mileageFromHQ = site.mileageFromHQ === "" ? null : Number(site.mileageFromHQ);
      site.travelTimeFromHQMinutes = site.travelTimeFromHQMinutes === "" ? null : Number(site.travelTimeFromHQMinutes);

      const payload = denormaliseSite(site);

      try {
        if (currentSiteId) {
          await apiRequest(`/api/sites/${currentSiteId}`, "PUT", payload);
        } else {
          await apiRequest("/api/sites", "POST", payload);
        }

        closeSiteModal();
        await loadSites();
        showToast("Site saved");
      } catch (e) {
        console.error(e);
        showToast("Failed to save site");
      }
    }

    async function deleteSite(id) {
      if (!confirm("Delete this site?")) return;

      try {
        await apiRequest(`/api/sites/${id}`, "DELETE");
        await loadSites();
        showToast("Site deleted");
      } catch (e) {
        console.error(e);
        showToast("Failed to delete site");
      }
    }

    function dispatchToSub() {
      if (!currentJob) {
        showToast("No job selected");
        return;
      }
      showToast(`Dispatch placeholder for ${currentJob.id}`);
    }

    function switchTab(tab) {
      document.querySelectorAll(".tab-content").forEach(el => el.classList.remove("active"));
      document.getElementById(tab).classList.add("active");

      document.querySelectorAll(".tab-link").forEach(link => {
        const isActive = link.getAttribute("data-tab") === tab;
        link.classList.toggle("text-blue-400", isActive);
        link.classList.toggle("text-slate-300", !isActive);
      });

      if (tab === "settings") renderSettings();
      if (tab === "sites") loadSites();
    }

    function renderDashboard() {
      const activeJobs = jobs.filter(j => (j.status || "").toLowerCase() !== "completed").length;
      const p1Jobs = jobs.filter(j => j.priority === "P1").length;
      const pendingJobs = jobs.filter(j => (j.status || "").toLowerCase() === "pending").length;
      const inProgressJobs = jobs.filter(j => (j.status || "").toLowerCase() === "in progress").length;

      document.getElementById("stats").innerHTML = `
        <div class="card p-6">
          <div class="text-5xl font-bold text-blue-400">${activeJobs}</div>
          <div class="text-slate-400">Active Jobs</div>
        </div>
        <div class="card p-6">
          <div class="text-5xl font-bold text-red-400">${p1Jobs}</div>
          <div class="text-slate-400">P1 Jobs</div>
        </div>
        <div class="card p-6">
          <div class="text-5xl font-bold text-amber-400">${pendingJobs}</div>
          <div class="text-slate-400">Pending</div>
        </div>
        <div class="card p-6">
          <div class="text-5xl font-bold text-violet-400">${inProgressJobs}</div>
          <div class="text-slate-400">In Progress</div>
        </div>
      `;

      const recent = jobs.slice(0, 4);

      document.getElementById("recent-jobs").innerHTML = recent.length
        ? recent.map(j => `
          <button onclick="openJobModalById('${j.id}')" class="card p-6 hover:border-blue-500 cursor-pointer text-left">
            <div class="flex items-start justify-between gap-4">
              <div>
                <div class="font-medium">${escapeHtml(j.title)}</div>
                <div class="text-xs text-slate-400 mt-1">${escapeHtml(getClientName(j.clientId))}</div>
                <div class="text-xs text-slate-500 mt-2">${escapeHtml((j.description || "").substring(0, 90))}${(j.description || "").length > 90 ? "..." : ""}</div>
              </div>
              <span class="status-badge ${getPriorityClass(j.priority)}">${escapeHtml(j.priority || "N/A")}</span>
            </div>
          </button>
        `).join("")
        : '<div class="card p-6 text-slate-400">No jobs found</div>';
    }

    function renderAllJobs() {
      document.getElementById("all-jobs-list").innerHTML = jobs.length
        ? jobs.map(j => `
          <button onclick="openJobModalById('${j.id}')" class="card p-6 hover:border-blue-500 cursor-pointer text-left">
            <div class="flex justify-between gap-4">
              <div>
                <span class="status-badge ${getPriorityClass(j.priority)}">${escapeHtml(j.priority || "N/A")}</span>
                <div class="font-semibold mt-3">${escapeHtml(j.title)}</div>
                <div class="text-sm text-slate-400 mt-1">${escapeHtml(getClientName(j.clientId))}</div>
                <div class="text-xs text-slate-500 mt-2">${escapeHtml(j.location || "No location")}</div>
              </div>
              <div class="text-right text-slate-400 text-sm shrink-0">
                <div>${escapeHtml(j.status || "pending")}</div>
                <div class="text-xs text-slate-500 mt-1">${escapeHtml(j.id || "")}</div>
              </div>
            </div>
          </button>
        `).join("")
        : '<div class="card p-6 text-slate-400">No jobs found</div>';
    }

    async function initialise() {
      document.querySelectorAll(".tab-link").forEach(link => {
        link.addEventListener("click", e => {
          e.preventDefault();
          switchTab(link.getAttribute("data-tab"));
        });
      });

      await loadClientsCache();
      await loadJobs();
      switchTab("dashboard");
    }

    window.addEventListener("load", initialise);
  </script>
</body>
</html>
