<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FieldOps Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'DM Sans', system-ui, sans-serif; }
    .syne { font-family: 'Syne', sans-serif; }
    .card { background: #080f20; border: 1px solid #1e293b; border-radius: 12px; }
    .modal { animation: modalPop 0.2s ease-out forwards; }
    @keyframes modalPop { from { opacity: 0; transform: scale(0.95) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body class="bg-[#030810] text-slate-200 min-h-screen">

  <nav class="bg-[#050d1a] border-b border-slate-800 py-3 px-6 flex items-center justify-between sticky top-0 z-50">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 bg-gradient-to-br from-blue-600 to-violet-600 rounded-xl flex items-center justify-center text-xl">⚡</div>
      <div>
        <div class="syne text-2xl font-black tracking-tighter">FieldOps Pro</div>
        <div class="text-[10px] text-slate-500 tracking-[1px] uppercase">Facilities Management</div>
      </div>
    </div>

    <div class="flex gap-8 text-sm font-medium" id="tabs">
      <a href="#" data-tab="dashboard" class="tab-link active text-blue-400">Dashboard</a>
      <a href="#" data-tab="jobs" class="tab-link">All Jobs</a>
      <a href="#" data-tab="settings" class="tab-link">Settings</a>
    </div>
  </nav>

  <div class="p-6">

    <!-- Dashboard -->
    <div id="dashboard" class="tab-content active">
      <div class="max-w-7xl mx-auto">
        <h1 class="syne text-4xl font-black mb-8">Operations Overview</h1>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-12" id="stats"></div>
        <h2 class="text-2xl font-semibold mb-6">Recent Jobs</h2>
        <div class="grid gap-4" id="recent-jobs"></div>
      </div>
    </div>

    <!-- All Jobs -->
    <div id="jobs" class="tab-content">
      <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-6">
          <h1 class="syne text-3xl font-black">All Jobs</h1>
          <button onclick="openNewJobModal()" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-2xl text-sm font-medium">+ New Job</button>
        </div>
        <div class="grid gap-4" id="all-jobs-list"></div>
      </div>
    </div>

    <!-- Settings -->
    <div id="settings" class="tab-content">
      <div class="max-w-6xl mx-auto">
        <h1 class="syne text-3xl font-black mb-8">Master Data</h1>
        <div class="grid grid-cols-2 gap-8">
          <div class="card p-6">
            <h2 class="font-semibold mb-4 flex justify-between">Clients <button onclick="addMasterItem('clients')" class="text-blue-400 text-sm">+ Add</button></h2>
            <div id="clients-list" class="space-y-3"></div>
          </div>
          <div class="card p-6">
            <h2 class="font-semibold mb-4 flex justify-between">Subcontractors <button onclick="addMasterItem('subcontractors')" class="text-blue-400 text-sm">+ Add</button></h2>
            <div id="subcontractors-list" class="space-y-3"></div>
          </div>
          <div class="card p-6">
            <h2 class="font-semibold mb-4 flex justify-between">Engineers <button onclick="addMasterItem('engineers')" class="text-blue-400 text-sm">+ Add</button></h2>
            <div id="engineers-list" class="space-y-3"></div>
          </div>
          <div class="card p-6">
            <h2 class="font-semibold mb-4 flex justify-between">Vehicles <button onclick="addMasterItem('vehicles')" class="text-blue-400 text-sm">+ Add</button></h2>
            <div id="vehicles-list" class="space-y-3"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Master Edit Modal -->
  <div id="master-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100]">
    <div class="modal bg-[#080f20] border border-slate-700 rounded-2xl w-full max-w-md p-8">
      <h3 id="master-modal-title" class="text-xl font-semibold mb-6"></h3>
      <div id="master-modal-form" class="space-y-4"></div>
      <div class="flex gap-3 mt-8">
        <button onclick="closeMasterModal()" class="flex-1 py-3 text-slate-400">Cancel</button>
        <button onclick="saveMasterItem()" class="flex-1 py-3 bg-blue-600 rounded-xl">Save</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="hidden fixed bottom-6 right-6 bg-blue-600 text-white px-6 py-3 rounded-2xl shadow-2xl z-[200]">
    <span id="toast-text"></span>
  </div>

  <script>
    const API_BASE = "https://fieldops-pro-worker.jamie-def.workers.dev";

    let currentMasterCollection = null;
    let currentMasterId = null;

    async function apiRequest(endpoint, method = "GET", body = null) {
      try {
        const opts = { method, headers: {"Content-Type": "application/json"} };
        if (body) opts.body = JSON.stringify(body);

        const res = await fetch(API_BASE + endpoint, opts);
        
        if (!res.ok) {
          const errorText = await res.text().catch(() => "Unknown error");
          console.error(`API Error ${res.status}:`, errorText);
          showToast(`Error ${res.status}: ${errorText.substring(0, 80)}`);
          return null;
        }
        return await res.json().catch(() => null);
      } catch (err) {
        console.error("Fetch error:", err);
        showToast("Cannot reach Worker. Check if deployed and binding is 'fieldops_kv'");
        return null;
      }
    }

    async function renderSettings() {
      const clients = await apiRequest("/api/clients") || [];
      const subs = await apiRequest("/api/subcontractors") || [];
      const engineers = await apiRequest("/api/engineers") || [];
      const vehicles = await apiRequest("/api/vehicles") || [];

      document.getElementById("clients-list").innerHTML = clients.map(c => `
        <div class="flex justify-between bg-[#0a1628] p-4 rounded-xl">
          <div><div class="font-medium">${c.name}</div></div>
          <div class="flex gap-3">
            <button onclick="editMasterItem('clients', ${JSON.stringify(c)})" class="text-blue-400">Edit</button>
            <button onclick="deleteMasterItem('clients', '${c.id}')" class="text-red-400">Delete</button>
          </div>
        </div>
      `).join('') || '<p class="text-slate-400 py-8 text-center">No clients yet</p>';

      document.getElementById("subcontractors-list").innerHTML = subs.map(s => `
        <div class="flex justify-between bg-[#0a1628] p-4 rounded-xl">
          <div><div class="font-medium">${s.name}</div></div>
          <div class="flex gap-3">
            <button onclick="editMasterItem('subcontractors', ${JSON.stringify(s)})" class="text-blue-400">Edit</button>
            <button onclick="deleteMasterItem('subcontractors', '${s.id}')" class="text-red-400">Delete</button>
          </div>
        </div>
      `).join('') || '<p class="text-slate-400 py-8 text-center">No subcontractors yet</p>';

      document.getElementById("engineers-list").innerHTML = engineers.map(e => `
        <div class="flex justify-between bg-[#0a1628] p-4 rounded-xl">
          <div><div class="font-medium">${e.name}</div></div>
          <div class="flex gap-3">
            <button onclick="editMasterItem('engineers', ${JSON.stringify(e)})" class="text-blue-400">Edit</button>
            <button onclick="deleteMasterItem('engineers', '${e.id}')" class="text-red-400">Delete</button>
          </div>
        </div>
      `).join('') || '<p class="text-slate-400 py-8 text-center">No engineers yet</p>';

      document.getElementById("vehicles-list").innerHTML = vehicles.map(v => `
        <div class="flex justify-between bg-[#0a1628] p-4 rounded-xl">
          <div><div class="font-medium">${v.name || v.registration || 'Vehicle'}</div></div>
          <div class="flex gap-3">
            <button onclick="editMasterItem('vehicles', ${JSON.stringify(v)})" class="text-blue-400">Edit</button>
            <button onclick="deleteMasterItem('vehicles', '${v.id}')" class="text-red-400">Delete</button>
          </div>
        </div>
      `).join('') || '<p class="text-slate-400 py-8 text-center">No vehicles yet</p>';
    }

    function addMasterItem(coll) {
      currentMasterCollection = coll;
      currentMasterId = null;
      showMasterModal(coll, {});
    }

    function editMasterItem(coll, item) {
      currentMasterCollection = coll;
      currentMasterId = item.id;
      showMasterModal(coll, item);
    }

    function showMasterModal(coll, item) {
      let title = `Add ${coll.charAt(0).toUpperCase() + coll.slice(1)}`;
      if (item.id) title = `Edit ${coll.charAt(0).toUpperCase() + coll.slice(1)}`;

      document.getElementById("master-modal-title").textContent = title;

      let formHTML = '';
      if (coll === 'clients') {
        formHTML = `
          <input id="m-name" value="${item.name||''}" placeholder="Client Name" class="w-full bg-[#0a1628] border border-slate-700 rounded-xl p-4">
          <input id="m-contact" value="${item.contact||''}" placeholder="Contact" class="w-full bg-[#0a1628] border border-slate-700 rounded-xl p-4">
          <input id="m-email" value="${item.email||''}" placeholder="Email" class="w-full bg-[#0a1628] border border-slate-700 rounded-xl p-4">
        `;
      } else if (coll === 'subcontractors') {
        formHTML = `
          <input id="m-name" value="${item.name||''}" placeholder="Company Name" class="w-full bg-[#0a1628] border border-slate-700 rounded-xl p-4">
          <input id="m-category" value="${item.category||''}" placeholder="Category" class="w-full bg-[#0a1628] border border-slate-700 rounded-xl p-4">
        `;
      } else if (coll === 'engineers') {
        formHTML = `
          <input id="m-name" value="${item.name||''}" placeholder="Name" class="w-full bg-[#0a1628] border border-slate-700 rounded-xl p-4">
        `;
      } else if (coll === 'vehicles') {
        formHTML = `
          <input id="m-name" value="${item.name||''}" placeholder="Vehicle Name/Reg" class="w-full bg-[#0a1628] border border-slate-700 rounded-xl p-4">
        `;
      }

      document.getElementById("master-modal-form").innerHTML = formHTML;
      document.getElementById("master-modal").classList.remove("hidden");
    }

    function closeMasterModal() {
      document.getElementById("master-modal").classList.add("hidden");
    }

    async function saveMasterItem() {
      const coll = currentMasterCollection;
      const data = { id: currentMasterId };

      document.querySelectorAll("#master-modal-form input").forEach(input => {
        data[input.id.replace('m-', '')] = input.value.trim();
      });

      try {
        await saveItem(coll, data);
        showToast("Saved successfully");
        closeMasterModal();
        renderSettings();
      } catch (e) {
        showToast("Save failed - check Worker code and binding");
        console.error(e);
      }
    }

    async function saveItem(coll, item) {
      if (item.id) {
        await apiRequest(`/api/${coll}/${item.id}`, "PUT", item);
      } else {
        await apiRequest(`/api/${coll}`, "POST", item);
      }
    }

    async function deleteItem(coll, id) {
      await apiRequest(`/api/${coll}/${id}`, "DELETE");
    }

    function deleteMasterItem(coll, id) {
      if (confirm("Delete this item?")) {
        deleteItem(coll, id).then(() => {
          showToast("Deleted");
          renderSettings();
        });
      }
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      document.getElementById('toast-text').textContent = msg;
      t.classList.remove('hidden');
      setTimeout(() => t.classList.add('hidden'), 3000);
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
      document.querySelectorAll('.tab-link').forEach(l => l.classList.toggle('text-blue-400', l.getAttribute('data-tab') === tab));
      if (tab === 'settings') renderSettings();
    }

    window.onload = () => {
      document.querySelectorAll('.tab-link').forEach(link => {
        link.addEventListener('click', e => {
          e.preventDefault();
          switchTab(link.getAttribute('data-tab'));
        });
      });
      switchTab('dashboard');
    };
  </script>
</body>
</html>
