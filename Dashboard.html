<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FieldOps Pro - FM Management System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800;900&amp;family=DM+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
    }
    .syne {
      font-family: 'Syne', sans-serif;
    }
    .card {
      background: #080f20;
      border: 1px solid #1e293b;
      border-radius: 12px;
    }
    .btn-primary {
      background: #1d4ed8;
      color: white;
      font-weight: 700;
    }
    .status-badge {
      padding: 4px 12px;
      border-radius: 9999px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.5px;
    }
    .modal {
      animation: modalPop 0.2s ease-out forwards;
    }
    @keyframes modalPop {
      from { opacity: 0; transform: scale(0.95) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
  </style>
</head>
<body class="bg-[#030810] text-slate-200 min-h-screen">

  <!-- Top Navigation -->
  <nav class="bg-[#050d1a] border-b border-slate-800 py-3 px-6 flex items-center justify-between sticky top-0 z-50">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 bg-gradient-to-br from-blue-600 to-violet-600 rounded-xl flex items-center justify-center text-xl">⚡</div>
      <div>
        <div class="syne text-2xl font-black tracking-tighter">FieldOps Pro</div>
        <div class="text-[10px] text-slate-500 tracking-[1px] uppercase">Facilities Management</div>
      </div>
    </div>

    <div class="flex gap-8 text-sm font-medium">
      <a href="#" onclick="switchTab(0)" class="tab-link active text-blue-400">Dashboard</a>
      <a href="#" onclick="switchTab(1)" class="tab-link">All Jobs</a>
      <a href="#" onclick="switchTab(2)" class="tab-link">Compliance</a>
      <a href="#" onclick="switchTab(3)" class="tab-link">Engineer App</a>
      <a href="#" onclick="switchTab(4)" class="tab-link">Invoicing</a>
      <a href="#" onclick="switchTab(5)" class="tab-link">Settings</a>
    </div>

    <div class="flex items-center gap-6 text-xs">
      <div class="text-center">
        <div class="text-red-400 font-bold text-lg leading-none">3</div>
        <div class="text-slate-500">P1 Active</div>
      </div>
      <div class="text-center">
        <div class="text-orange-400 font-bold text-lg leading-none">1</div>
        <div class="text-slate-500">Breached</div>
      </div>
      <div class="text-center">
        <div class="text-purple-400 font-bold text-lg leading-none">2</div>
        <div class="text-slate-500">Subcontracted</div>
      </div>
    </div>
  </nav>

  <!-- Email Banner -->
  <div class="bg-[#0a1628] border-b border-slate-700 py-2 px-6 text-sm flex items-center gap-3">
    <span class="text-blue-400 font-semibold">📧 Email Integration Active</span>
    <span class="text-slate-400">• 3 new reactive jobs waiting for review</span>
    <span onclick="alert('Email settings would open here in full app')" class="ml-auto text-blue-400 cursor-pointer hover:underline">Configure →</span>
  </div>

  <div class="p-6" id="content">
    <!-- Dashboard loads by default -->
  </div>

  <!-- Job Detail Modal -->
  <div id="job-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100]">
    <div class="modal bg-[#080f20] border border-slate-700 rounded-2xl w-full max-w-4xl max-h-[92vh] overflow-hidden flex flex-col">
      <!-- Modal Header -->
      <div class="border-b border-slate-700 px-8 py-5 flex items-center justify-between">
        <div>
          <div id="modal-job-id" class="font-mono text-xs text-slate-500"></div>
          <div id="modal-title" class="text-2xl font-semibold syne"></div>
        </div>
        <button onclick="closeModal()" class="text-3xl text-slate-400 hover:text-white transition-colors">×</button>
      </div>

      <!-- Modal Body -->
      <div class="flex-1 overflow-auto p-8" id="modal-body">
        <!-- Content injected by JavaScript -->
      </div>

      <!-- Modal Footer -->
      <div class="border-t border-slate-700 px-8 py-5 flex gap-3 justify-end">
        <button onclick="closeModal()" class="px-6 py-2.5 text-slate-400 hover:text-white transition-colors">Close</button>
        <button onclick="saveJobChanges()" class="btn-primary px-8 py-2.5 rounded-xl">Save Changes</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="hidden fixed bottom-6 right-6 bg-blue-600 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-2 z-[200]">
    <span id="toast-text"></span>
  </div>

  <script>
    // ====================== SEED DATA ======================
    const now = new Date();

    const CLIENTS = [
      { id: "C001", name: "The Southern Co-op", contact: "Lisa Hennessy" },
      { id: "C002", name: "Chapplins Letting Agents", contact: "Mark Chaplin" },
      { id: "C003", name: "Fareham Borough Council", contact: "David Osei" },
    ];

    let jobs = [
      {
        id: "JOB-0891",
        title: "HVAC Unit Failure",
        clientId: "C001",
        siteKey: "southernco-op-southsea",
        priority: "P1",
        status: "in-progress",
        category: "HVAC",
        description: "Complete rooftop HVAC failure. Store temperature rising rapidly. Urgent attention required to prevent stock damage.",
        createdAt: new Date(now - 3*3600000).toISOString(),
        responseDeadline: new Date(now.getTime() + 1*3600000).toISOString(),
        completionDeadline: new Date(now.getTime() + 21*3600000).toISOString(),
        location: "Southern Co-op, Albert Rd, Southsea, PO5 2SG",
        engineer: "Dan Kovacs (E001)",
        labourHours: 2.5,
        totalValue: 1240
      },
      {
        id: "JOB-0890",
        title: "Boiler Fault – No Heating",
        clientId: "C002",
        siteKey: "chapplins-highst",
        priority: "P1",
        status: "scheduled",
        category: "Plumbing",
        description: "Tenant reports no heating. Boiler showing F28 fault code.",
        createdAt: new Date(now - 6*3600000).toISOString(),
        responseDeadline: new Date(now.getTime() + 18*3600000).toISOString(),
        completionDeadline: new Date(now.getTime() + 18*3600000).toISOString(),
        location: "14 High Street, Fareham, PO16 7AF",
        engineer: "Aisha Brennan (E002)",
        labourHours: 0,
        totalValue: 380
      },
      {
        id: "JOB-0889",
        title: "Drain Blockage – External Drain",
        clientId: "C001",
        siteKey: "southernco-op-gosport",
        priority: "P2",
        status: "subcontracted",
        category: "Drainage",
        description: "External drain blocked causing standing water near delivery bay.",
        createdAt: new Date(now - 5*3600000).toISOString(),
        responseDeadline: new Date(now.getTime() + 163*3600000).toISOString(),
        completionDeadline: new Date(now.getTime() + 163*3600000).toISOString(),
        location: "Southern Co-op, Stoke Rd, Gosport, PO12 1LH",
        engineer: "Subcontracted - Drainage Direct",
        labourHours: 0,
        totalValue: 1450
      }
    ];

    const STATUS_CFG = {
      "in-progress": { label: "In Progress", color: "#f59e0b", icon: "🔧" },
      "scheduled": { label: "Scheduled", color: "#38bdf8", icon: "📅" },
      "subcontracted": { label: "Subcontracted", color: "#c084fc", icon: "🔀" },
      "complete": { label: "Complete", color: "#34d399", icon: "✓" },
      "pending": { label: "Pending", color: "#64748b", icon: "⏳" }
    };

    const PRIORITY_COLORS = {
      "P1": "#ef4444",
      "P2": "#f97316",
      "P3": "#eab308"
    };

    let currentJobId = null;

    // ====================== HELPERS ======================
    function formatDate(iso) {
      if (!iso) return "—";
      return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function timeAgo(iso) {
      const diffHours = (now - new Date(iso)) / 3600000;
      if (diffHours < 1) return "Just now";
      if (diffHours < 24) return Math.floor(diffHours) + "h ago";
      return Math.floor(diffHours / 24) + "d ago";
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      document.getElementById('toast-text').textContent = msg;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 2800);
    }

    // ====================== MODAL ======================
    function openJobModal(jobId) {
      currentJobId = jobId;
      const job = jobs.find(j => j.id === jobId);
      if (!job) return;

      document.getElementById('modal-job-id').textContent = job.id;
      document.getElementById('modal-title').textContent = job.title;

      const status = STATUS_CFG[job.status] || STATUS_CFG.pending;
      const priColor = PRIORITY_COLORS[job.priority] || "#eab308";

      let html = `
        <div class="grid grid-cols-2 gap-8">
          <!-- Left Column -->
          <div>
            <div class="flex items-center gap-3 mb-6">
              <span class="status-badge" style="background: ${status.color}20; color: ${status.color}">
                ${status.icon} ${status.label}
              </span>
              <span class="px-3 py-1 text-xs font-bold rounded-full" style="background: ${priColor}20; color: ${priColor}">
                ${job.priority}
              </span>
            </div>

            <div class="space-y-6">
              <div>
                <div class="text-xs text-slate-400 mb-1">CLIENT</div>
                <div class="font-medium">${CLIENTS.find(c => c.id === job.clientId)?.name || 'Unknown'}</div>
              </div>

              <div>
                <div class="text-xs text-slate-400 mb-1">LOCATION</div>
                <div class="text-sm">${job.location}</div>
              </div>

              <div>
                <div class="text-xs text-slate-400 mb-1">ASSIGNED ENGINEER / SUB</div>
                <div class="font-medium">${job.engineer}</div>
              </div>

              <div>
                <div class="text-xs text-slate-400 mb-1">CATEGORY</div>
                <div class="inline-block px-4 py-1 bg-slate-800 rounded-full text-sm">${job.category}</div>
              </div>
            </div>
          </div>

          <!-- Right Column -->
          <div>
            <div class="bg-[#0a1628] rounded-xl p-6 mb-6">
              <div class="flex justify-between mb-4">
                <div>
                  <div class="text-xs text-slate-400">CREATED</div>
                  <div class="font-medium">${timeAgo(job.createdAt)}</div>
                </div>
                <div class="text-right">
                  <div class="text-xs text-slate-400">COMPLETE BY</div>
                  <div class="font-medium text-amber-400">${formatDate(job.completionDeadline)}</div>
                </div>
              </div>
              <div class="h-2 bg-slate-700 rounded-full overflow-hidden">
                <div class="h-2 bg-blue-500 rounded-full w-3/4"></div>
              </div>
            </div>

            <div>
              <div class="text-xs text-slate-400 mb-2">DESCRIPTION</div>
              <div class="text-sm leading-relaxed text-slate-300 bg-[#0a1628] p-5 rounded-xl border border-slate-700">
                ${job.description}
              </div>
            </div>

            <div class="mt-8">
              <div class="text-xs text-slate-400 mb-3">QUICK ACTIONS</div>
              <div class="grid grid-cols-2 gap-3">
                <button onclick="changeStatus('${job.id}', 'in-progress')" class="py-3 text-sm font-medium bg-emerald-900 hover:bg-emerald-800 rounded-xl transition-colors">Mark In Progress</button>
                <button onclick="changeStatus('${job.id}', 'complete')" class="py-3 text-sm font-medium bg-violet-900 hover:bg-violet-800 rounded-xl transition-colors">Mark Complete</button>
              </div>
            </div>
          </div>
        </div>

        <div class="mt-10 pt-8 border-t border-slate-700">
          <div class="text-xs uppercase tracking-widest text-slate-400 mb-4">Notes &amp; Activity</div>
          <div class="space-y-4 text-sm">
            <div class="flex gap-4">
              <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-xs font-bold">DK</div>
              <div>
                <div class="font-medium">Dan Kovacs • 2h ago</div>
                <div class="text-slate-400">On site. Diagnosed failed fan motor. Part ordered via PO-1001.</div>
              </div>
            </div>
            <div class="flex gap-4">
              <div class="w-8 h-8 bg-slate-600 rounded-full flex items-center justify-center text-xs font-bold">OA</div>
              <div>
                <div class="font-medium">Office Admin • Yesterday</div>
                <div class="text-slate-400">Client confirmed emergency access granted.</div>
              </div>
            </div>
          </div>
        </div>
      `;

      document.getElementById('modal-body').innerHTML = html;
      document.getElementById('job-modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('job-modal').classList.add('hidden');
    }

    function saveJobChanges() {
      showToast("Job changes saved successfully");
      closeModal();
      renderDashboard(); // refresh list
    }

    function changeStatus(jobId, newStatus) {
      const job = jobs.find(j => j.id === jobId);
      if (job) {
        job.status = newStatus;
        showToast(`Job status updated to ${newStatus}`);
        closeModal();
        renderDashboard();
      }
    }

    // ====================== DASHBOARD ======================
    function renderDashboard() {
      let html = `
        <div class="max-w-7xl mx-auto">
          <h1 class="syne text-4xl font-black mb-8 tracking-tight">Operations Overview</h1>
          
          <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-12">
            <div class="card p-6">
              <div class="text-5xl font-bold text-blue-400">${jobs.length}</div>
              <div class="text-slate-400 mt-1">Active Jobs</div>
            </div>
            <div class="card p-6">
              <div class="text-5xl font-bold text-red-400">2</div>
              <div class="text-slate-400 mt-1">P1 Critical</div>
            </div>
            <div class="card p-6">
              <div class="text-5xl font-bold text-orange-400">1</div>
              <div class="text-slate-400 mt-1">SLA Breached</div>
            </div>
            <div class="card p-6">
              <div class="text-5xl font-bold text-purple-400">2</div>
              <div class="text-slate-400 mt-1">Subcontracted</div>
            </div>
          </div>

          <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-semibold">Recent Jobs</h2>
            <button onclick="alert('New Job form would open here')" class="btn-primary px-6 py-2.5 rounded-2xl text-sm flex items-center gap-2">
              + New Job
            </button>
          </div>

          <div class="grid gap-4">
            ${jobs.map(job => {
              const status = STATUS_CFG[job.status] || STATUS_CFG.pending;
              return `
                <div onclick="openJobModal('${job.id}')" class="card p-6 hover:border-blue-500 transition-all cursor-pointer group">
                  <div class="flex items-start justify-between">
                    <div class="flex-1">
                      <div class="flex items-center gap-3">
                        <span class="status-badge" style="background: ${status.color}20; color: ${status.color}">
                          ${status.icon} ${status.label}
                        </span>
                        <span class="font-mono text-xs text-slate-500">${job.id}</span>
                      </div>
                      <div class="font-semibold text-lg mt-2 group-hover:text-blue-400 transition-colors">${job.title}</div>
                      <div class="text-sm text-slate-400 mt-1">${CLIENTS.find(c => c.id === job.clientId)?.name}</div>
                    </div>
                    
                    <div class="text-right">
                      <div class="text-xs text-slate-400">Due</div>
                      <div class="font-medium text-amber-400">${formatDate(job.completionDeadline)}</div>
                      <div class="text-[10px] text-slate-500 mt-3">${timeAgo(job.createdAt)}</div>
                    </div>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `;
      document.getElementById('content').innerHTML = html;
    }

    function switchTab(tabIndex) {
      document.querySelectorAll('.tab-link').forEach((link, i) => {
        link.classList.toggle('active', i === tabIndex);
        link.classList.toggle('text-blue-400', i === tabIndex);
      });

      if (tabIndex === 0) {
        renderDashboard();
      } else {
        document.getElementById('content').innerHTML = `
          <div class="max-w-7xl mx-auto py-24 text-center">
            <div class="text-7xl mb-6 opacity-50">🚧</div>
            <h2 class="text-3xl font-semibold mb-3">Tab Coming Soon</h2>
            <p class="text-slate-400 max-w-md mx-auto">This section is fully implemented in the original React version of FieldOps Pro.</p>
          </div>
        `;
      }
    }

    // Initialize app
    window.onload = () => {
      renderDashboard();
    };
  </script>
</body>
</html>
