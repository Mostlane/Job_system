const fmt = (n) => ((n || 0).toLocaleString(“en-GB”,{minimumFractionDigits:2,maximumFractionDigits:2})) || “0.00”;
const formatDate = (iso) => !iso ? “—” : new Date(iso).toLocaleDateString(“en-GB”,{day:“numeric”,month:“short”,year:“numeric”});
const formatDateTime = (iso) => !iso ? “—” : new Date(iso).toLocaleString(“en-GB”,{day:“numeric”,month:“short”,hour:“2-digit”,minute:“2-digit”});
const timeAgo = (iso) => {
const diff = now - new Date(iso);
const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000);
if(h===0) return `${m}m ago`; if(h<24) return `${h}h ago`; return `${Math.floor(h/24)}d ago`;
};
const countdown = (iso) => {
const diff = new Date(iso) - now, abs = Math.abs(diff);
const h = Math.floor(abs/3600000), m = Math.floor((abs%3600000)/60000);
return diff<0 ? `Breached ${h}h ${m}m ago` : `${h}h ${m}m remaining`;
};
const getSLAStatus = (job) => {
if([“complete”,“invoiced”].includes(job.status)) return “met”;
const diff = new Date(job.completionDeadline) - now;
if(diff<0) return “breached”; if(diff<3600000) return “critical”; if(diff<7200000) return “warning”; return “ok”;
};
const SLA_COLOR = { ok:”#34d399”, warning:”#f59e0b”, critical:”#ef4444”, breached:”#dc2626”, met:”#475569” };

// Site intelligence: get all jobs + compliance at same site within 14 days
const getSiteIntelligence = (job, allJobs, complianceSchedule) => {
if(!job.siteKey) return { jobs:[], compliance:[] };
const siteJobs = allJobs.filter(j => j.siteKey===job.siteKey && j.id!==job.id && ![“invoiced”].includes(j.status));
const cutoff = new Date(now.getTime() + 14*86400000);
const siteDue = complianceSchedule.filter(c => {
const s = SITES_KV[c.siteKey];
const jobSite = SITES_KV[job.siteKey];
return c.siteKey===job.siteKey && new Date(c.nextDue) < cutoff;
});
return { jobs:siteJobs, compliance:siteDue };
};

function SubQuotePanel({job, subcontractors, onUpdate, showToast}) {
const sub = subcontractors.find(s=>s.id===job.subcontractorId);
const [subCost, setSubCost] = useState((job.subQuote ? job.subQuote.subCost : 0)||””);
const [subDesc, setSubDesc] = useState((job.subQuote ? job.subQuote.subDescription : ‘’)||””);
const [margin, setMargin] = useState((job.subQuote ? job.subQuote.margin : 35)||(sub && sub.defaultMargin)||35);
const [calloutSubCost, setCalloutSubCost] = useState((job.subQuote ? job.subQuote.calloutSubCost : 0)||””);
const [calloutMargin, setCalloutMargin] = useState((job.subQuote ? job.subQuote.calloutMargin : 35)||(sub && sub.defaultMargin)||35);

const clientCharge = parseFloat(subCost) * (1 + parseFloat(margin)/100);
const calloutCharge = parseFloat(calloutSubCost) * (1 + parseFloat(calloutMargin)/100);
const profit = clientCharge - parseFloat(subCost);
const calloutProfit = calloutCharge - parseFloat(calloutSubCost);

const saveQuote = () => {
onUpdate({…job, status:“sub-quoted”, subQuote:{
subCost:parseFloat(subCost), subDescription:subDesc, margin:parseFloat(margin),
clientCharge:parseFloat(clientCharge.toFixed(2)),
calloutSubCost:parseFloat(calloutSubCost), calloutMargin:parseFloat(calloutMargin),
calloutCharge:parseFloat(calloutCharge.toFixed(2)), approved:false, sentToClient:false,
}});
showToast(“Sub quote saved”);
};

const approveAndQuoteClient = () => {
onUpdate({…job, subQuote:{…job.subQuote, sentToClient:true}});
showToast(“Client quote sent (simulated)”);
};

const approveAndDispatch = () => {
const logEntry = {time:new Date().toISOString(), action:“works-approved”, sentBy:“Office Admin”, subcontractorName:(sub && sub.name), note:`Works approved. Sub cost £${fmt((job.subQuote ? job.subQuote.subCost : 0))}. Client approved £${fmt((job.subQuote ? job.subQuote.clientCharge : 0))}.`};
onUpdate({…job, subQuote:{…job.subQuote, approved:true}, subcontractorLog:[…(job.subcontractorLog||[]), logEntry]});
showToast(`Works dispatched back to ${(sub && sub.name)}`);
};

return (

<Card style={{padding:14,marginBottom:14,border:“1px solid #3b0764”}}>

function JobsTab({jobs, clients, engineers, subcontractors, compliance, onUpdate, showToast}) {
const [selected, setSelected] = useState(null);
const [showNew, setShowNew] = useState(false);
const [fClient, setFClient] = useState(“all”);
const [fStatus, setFStatus] = useState(“all”);
const [fPri, setFPri] = useState(“all”);
const [search, setSearch] = useState(””);

let visible = jobs;
if(fClient!==“all”) visible=visible.filter(j=>j.clientId===fClient);
if(fStatus!==“all”) visible=visible.filter(j=>j.status===fStatus);
if(fPri!==“all”) visible=visible.filter(j=>j.priority===fPri);
if(search){const q=search.toLowerCase();visible=visible.filter(j=>j.title.toLowerCase().includes(q)||j.id.toLowerCase().includes(q)||j.location.toLowerCase().includes(q));}
const priO={P1:0,P2:1,P3:2,P4:3,P5:4};
visible=[…visible].sort((a,b)=>{
const as=getSLAStatus(a)===“breached”?-1:0,bs=getSLAStatus(b)===“breached”?-1:0;
if(as!==bs) return as-bs;
return (priO[a.priority]||4)-(priO[b.priority]||4);
});

const handleUpdate=(updated)=>{onUpdate(jobs.map(j=>j.id===updated.id?updated:j));setSelected(updated);showToast(“Saved”);};
const handleNew=(nj)=>{onUpdate([nj,…jobs]);setShowNew(false);showToast(`${nj.id} logged`);};

return (
<div style={{display:“flex”,height:“100%”,overflow:“hidden”}}>
<div style={{width:selected?“420px”:“100%”,flexShrink:0,display:“flex”,flexDirection:“column”,borderRight:selected?“1px solid #1e293b”:“none”,overflow:“hidden”}}>
<div style={{padding:“12px 14px”,borderBottom:“1px solid #1e293b”,display:“flex”,gap:7,flexWrap:“wrap”,alignItems:“center”,flexShrink:0,background:”#030810”}}>
<Inp style={{width:150}} placeholder=“Search…” value={search} onChange={e=>setSearch(e.target.value)}/>
<Sel value={fClient} onChange={e=>setFClient(e.target.value)}><option value="all">All Clients</option>{clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</Sel>

<Sel value={fPri} onChange={e=>setFPri(e.target.value)}><option value="all">All Priority</option>{Object.keys(PRIORITY_SLA).map(p=><option key={p} value={p}>{p}</option>)}</Sel>
<div style={{marginLeft:“auto”,display:“flex”,gap:7,alignItems:“center”}}>
<span style={{fontSize:10,color:”#475569”}}>{visible.length} jobs</span>
<Btn style={{fontSize:11}} onClick={()=>setShowNew(true)}>+ New Job</Btn>
</div>
</div>
<div style={{flex:1,overflowY:“auto”,padding:10}}>
{visible.map(job=>{
const client=clients.find(c=>c.id===job.clientId);
const eng=engineers.find(e=>e.id===job.engineerId);
const sub=subcontractors.find(s=>s.id===job.subcontractorId);
const slaS=getSLAStatus(job);
const isSel=selected && selected.id===job.id;
const intel=getSiteIntelligence(job,jobs,compliance);
const hasIntel=intel.jobs.length+intel.compliance.length>0;
return (
<div key={job.id} onClick={()=>setSelected(job)} style={{background:isSel?”#0d1b33”:”#080f20”,border:`1px solid ${isSel?"#38bdf8":slaS==="breached"?"#ef444466":"#1e293b"}`,borderRadius:9,padding:“11px 13px”,marginBottom:6,cursor:“pointer”,transition:“all 0.1s”}}>
<div style={{display:“flex”,justifyContent:“space-between”,gap:8,marginBottom:4}}>
<div style={{flex:1,minWidth:0}}>
<div style={{fontSize:9,color:”#475569”,fontFamily:“monospace”,marginBottom:1}}>{job.id} · {job.category}</div>
<div style={{fontSize:12,fontWeight:700,color:”#f1f5f9”,lineHeight:1.3}}>{job.title}</div>
</div>
<div style={{display:“flex”,flexDirection:“column”,gap:3,alignItems:“flex-end”,flexShrink:0}}>
<PriBadge priority={job.priority}/>
<Badge status={job.status}/>
</div>
</div>
<div style={{fontSize:10,color:”#475569”,marginBottom:4}}><span style={{color:”#7dd3fc”}}>{(client && client.name)}</span> · {job.location}</div>
<div style={{display:“flex”,justifyContent:“space-between”,alignItems:“center”}}>
<div style={{fontSize:10,color:SLA_COLOR[slaS],display:“flex”,gap:4,alignItems:“center”}}>
<span style={{width:5,height:5,borderRadius:“50%”,background:SLA_COLOR[slaS],display:“inline-block”}}/>

</div>
<div style={{display:“flex”,gap:6,alignItems:“center”}}>
{hasIntel&&<span style={{fontSize:9,color:”#4ade80”,fontWeight:700,background:”#0c1f0a”,border:“1px solid #4ade8033”,borderRadius:3,padding:“1px 5px”}}>🗺 SITE</span>}
{sub&&<span style={{fontSize:9,color:”#c084fc”,fontWeight:700}}>🔀 {sub.name.split(” “)[0]}</span>}
{eng&&<span style={{fontSize:9,color:”#94a3b8”}}>{eng.initials}</span>}
</div>

</div>
);
})}

</div>
{selected&&(

<JobDetail job={selected} clients={clients} engineers={engineers} subcontractors={subcontractors} allJobs={jobs} compliance={compliance} onClose={()=>setSelected(null)} onUpdate={handleUpdate} showToast={showToast}/>
</div>
)}
{showNew&&<NewJobModal clients={clients} onClose={()=>setShowNew(false)} onSubmit={handleNew}/>}
</div>
);
}

// COMPLIANCE TAB (simplified)
// ══════════════════════════════════════════════════════════════════════════════
function ComplianceTab({schedule, clients, jobs, onUpdate, showToast}) {
const urgency=(item)=>{const days=(new Date(item.nextDue)-now)/86400000;if(days<0)return”overdue”;if(days<7)return”urgent”;if(days<30)return”due-soon”;return”ok”;};
const UC={overdue:”#ef4444”,urgent:”#f97316”,“due-soon”:”#eab308”,ok:”#34d399”};
const generate=(item)=>{
const client=clients.find(c=>c.id===item.clientId);
const site=SITES_KV[item.siteKey];
const pri=urgency(item)===“overdue”?“P1”:urgency(item)===“urgent”?“P2”:“P3”;
const priConf=PRIORITY_SLA[pri];
const nj={id:`JOB-${Date.now().toString().slice(-4)}`,clientId:item.clientId,siteKey:item.siteKey,title:item.title,type:“compliance”,category:item.category,priority:pri,status:“pending”,engineerId:null,location:(site && site.address)||(client && client.name)||””,description:`Compliance: ${item.title}. Due: ${formatDate(item.nextDue)}.`,createdAt:new Date().toISOString(),responseDeadline:new Date(now.getTime()+priConf.respond*3600000).toISOString(),completionDeadline:new Date(now.getTime()+priConf.complete*3600000).toISOString(),labourHours:0,labourRate:35,labourCost:0,materials:[],notes:[{author:“System”,time:new Date().toISOString(),text:`Auto-generated. Schedule item: ${item.id}`}],attachments:[],completedAt:null,invoiced:false,invoiceMonth:null,subcontractorId:null,subcontractorLog:[],subQuote:null,calloutCharged:false,quoteData:null,onHoldReason:null};
onUpdate(prev=>[nj,…prev]);showToast(`Job created: ${nj.id}`);
};
return (
<div style={{padding:24,maxWidth:1000}}>
<div style={{display:“flex”,justifyContent:“space-between”,alignItems:“center”,marginBottom:20}}>
<div><div style={{fontSize:20,fontWeight:900,color:”#f1f5f9”}}>Compliance Schedule</div><div style={{fontSize:11,color:”#475569”,marginTop:2}}>Auto-create jobs from due compliance items</div></div>
<Btn style={{background:”#064e3b”,fontSize:11}}>📂 Import Schedule (CSV)</Btn>
</div>
{[…schedule].sort((a,b)=>new Date(a.nextDue)-new Date(b.nextDue)).map(item=>{
const client=clients.find(c=>c.id===item.clientId);
const site=SITES_KV[item.siteKey];
const u=urgency(item);
const days=Math.round((new Date(item.nextDue)-now)/86400000);
const existing=jobs.find(j=>j.notes && j.notes.some(n=>n.text && n.text.includes(item.id)));
return (
<Card key={item.id} style={{padding:14,marginBottom:8,border:`1px solid ${UC[u]}44`}}>
<div style={{display:“flex”,justifyContent:“space-between”,alignItems:“flex-start”}}>
<div style={{flex:1}}>
<div style={{display:“flex”,gap:7,alignItems:“center”,marginBottom:5}}>
<span style={{fontSize:9,fontWeight:900,color:UC[u],background:UC[u]+“22”,border:`1px solid ${UC[u]}44`,padding:“2px 8px”,borderRadius:3,textTransform:“uppercase”}}>{days<0?`${Math.abs(days)}d OVERDUE`:`${days}d`}</span>
<span style={{fontSize:9,color:”#475569”,textTransform:“uppercase”,letterSpacing:“0.06em”}}>{item.frequency} · {item.category}</span>
</div>
<div style={{fontSize:13,fontWeight:700,color:”#f1f5f9”,marginBottom:2}}>{item.title}</div>
<div style={{fontSize:11,color:”#7dd3fc”,marginBottom:2}}>{(client && client.name)}</div>
{site&&<div style={{fontSize:10,color:”#475569”}}>{site.siteRef} · {site.address}</div>}
</div>
<div style={{textAlign:“right”,flexShrink:0}}>
<div style={{fontSize:12,fontWeight:700,color:UC[u],marginBottom:6}}>{formatDate(item.nextDue)}</div>
{existing?<span style={{fontSize:10,color:”#34d399”,fontWeight:700}}>✓ Job raised</span>:<Btn style={{fontSize:11,padding:“6px 12px”,background:u===“overdue”?”#dc2626”:u===“urgent”?”#9a3412”:”#1d4ed8”}} onClick={()=>generate(item)}>Create Job</Btn>}
</div>
</div>
</Card>
);
})}
</div>
);
}

// INVOICING (simplified but with subcontractor costs)
// ══════════════════════════════════════════════════════════════════════════════
function InvoicingTab({jobs, clients, engineers, onUpdate, showToast}) {
const [month,setMonth]=useState(“2025-01”);
const [showMargins,setShowMargins]=useState(true);
const calcJob=(j)=>{
const matCharged=j.materials.reduce((s,m)=>s+m.charged,0);
const labour=j.labourHours*j.labourRate;
const subCharge=((j.subQuote ? j.subQuote.calloutCharge : 0)||0)+((j.subQuote ? j.subQuote.clientCharge : 0)||0);
const matCost=j.materials.reduce((s,m)=>s+m.unitCost*m.qty,0);
const labourCost=j.labourHours*((engineers.find(e=>e.id===j.engineerId) ? engineers.find(e=>e.id===j.engineerId).hourlyRate : 0)||0);
const subCost=((j.subQuote ? j.subQuote.calloutSubCost : 0)||0)+((j.subQuote ? j.subQuote.subCost : 0)||0);
const total=matCharged+labour+subCharge;
const cost=matCost+labourCost+subCost;
return {matCharged,labour,subCharge,total,cost,margin:total-cost};
};
const markInvoiced=(ids)=>{onUpdate(prev=>prev.map(j=>ids.includes(j.id)?{…j,invoiced:true,invoiceMonth:month,status:“invoiced”}:j));showToast(`${ids.length} job(s) invoiced`);};

return (
<div style={{padding:24,maxWidth:1100}}>
<div style={{display:“flex”,justifyContent:“space-between”,alignItems:“center”,marginBottom:16}}>
<div><div style={{fontSize:20,fontWeight:900,color:”#f1f5f9”}}>Monthly Invoicing</div><div style={{fontSize:11,color:”#475569”,marginTop:2}}>Job-level breakdown · margins office-only</div></div>
<div style={{display:“flex”,gap:8,alignItems:“center”}}>
<div style={{display:“flex”,alignItems:“center”,gap:6,background:”#080f20”,border:“1px solid #1e293b”,borderRadius:7,padding:“6px 10px”}}>
<span style={{fontSize:11,color:”#475569”}}>Margins</span>
<button onClick={()=>setShowMargins(p=>!p)} style={{background:showMargins?”#1d4ed8”:”#1e293b”,border:“1px solid #334155”,color:”#e2e8f0”,borderRadius:20,padding:“3px 10px”,cursor:“pointer”,fontSize:11,fontWeight:700}}>{showMargins?“ON”:“OFF”}</button>
</div>
<Sel value={month} onChange={e=>setMonth(e.target.value)}><option value="2025-01">January 2025</option><option value="2024-12">December 2024</option></Sel>
</div>
</div>
<div style={{fontSize:10,color:”#f97316”,background:”#431407”,border:“1px solid #f9731644”,borderRadius:6,padding:“7px 12px”,marginBottom:18}}>🔒 Cost and margin columns are office/admin only – not included in client invoice exports.</div>

function NewJobModal({clients, onClose, onSubmit}) {
const [f,setF]=useState({title:””,clientId:””,siteKey:””,category:“HVAC”,priority:“P1”,location:””,description:””,type:“reactive”});
const set=(k,v)=>setF(p=>({…p,[k]:v}));
const clientSites=f.clientId?Object.entries(SITES_KV).filter(([k,s])=>s.clientId===f.clientId):[];
const submit=()=>{
if(!f.title||!f.clientId) return;
const pri=PRIORITY_SLA[f.priority]||PRIORITY_SLA.P1;
const site=SITES_KV[f.siteKey];
onSubmit({id:`JOB-${Date.now().toString().slice(-4)}`,clientId:f.clientId,siteKey:f.siteKey||null,title:f.title,type:f.type,category:f.category,priority:f.priority,status:“pending”,engineerId:null,location:f.siteKey&&site?site.address:f.location,description:f.description,createdAt:new Date().toISOString(),responseDeadline:new Date(Date.now()+pri.respond*3600000).toISOString(),completionDeadline:new Date(Date.now()+pri.complete*3600000).toISOString(),labourHours:0,labourRate:35,labourCost:0,materials:[],notes:[],attachments:[],completedAt:null,invoiced:false,invoiceMonth:null,subcontractorId:null,subcontractorLog:[],subQuote:null,calloutCharged:false,quoteData:null,onHoldReason:null});
};
const iS={width:“100%”};
return (
<div style={{position:“fixed”,inset:0,background:”#000000cc”,zIndex:100,display:“flex”,alignItems:“center”,justifyContent:“center”,backdropFilter:“blur(4px)”}}>
<Card style={{width:520,maxHeight:“90vh”,overflowY:“auto”,padding:22,border:“1px solid #1e3a5f”}}>
<div style={{display:“flex”,justifyContent:“space-between”,alignItems:“center”,marginBottom:16}}>
<div style={{fontSize:15,fontWeight:900,color:”#f1f5f9”}}>Log New Job</div>
<button onClick={onClose} style={{background:”#1e293b”,border:“1px solid #334155”,color:”#94a3b8”,borderRadius:6,padding:“4px 10px”,cursor:“pointer”,fontSize:18}}>×</button>
</div>
<div style={{display:“grid”,gap:11}}>
<div style={{display:“flex”,gap:6}}>{[“reactive”,“compliance”].map(t=><button key={t} onClick={()=>set(“type”,t)} style={{flex:1,background:f.type===t?”#1d4ed8”:”#1e293b”,color:f.type===t?”#fff”:”#64748b”,border:“1px solid #334155”,borderRadius:6,padding:“7px”,cursor:“pointer”,fontSize:12,fontWeight:700,textTransform:“capitalize”}}>{t===“reactive”?“⚡ Reactive”:“📋 Compliance”}</button>)}</div>
<div><Lbl>Job Title</Lbl><Inp style={iS} value={f.title} onChange={e=>set(“title”,e.target.value)} placeholder=“Fault description…”/></div>
<div style={{display:“grid”,gridTemplateColumns:“1fr 1fr”,gap:10}}>
<div><Lbl>Client</Lbl><Sel style={iS} value={f.clientId} onChange={e=>{set(“clientId”,e.target.value);set(“siteKey”,””);}}><option value="">Select client…</option>{clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</Sel></div>
<div><Lbl>Site</Lbl><Sel style={iS} value={f.siteKey} onChange={e=>set(“siteKey”,e.target.value)} disabled={!f.clientId}><option value="">Select site…</option>{clientSites.map(([k,s])=><option key={k} value={k}>{s.name}</option>)}</Sel></div>
</div>
<div style={{display:“grid”,gridTemplateColumns:“1fr 1fr”,gap:10}}>
<div><Lbl>Category</Lbl><Sel style={iS} value={f.category} onChange={e=>set(“category”,e.target.value)}>{[“HVAC”,“Electrical”,“Plumbing”,“Gas”,“Fire Safety”,“Drainage”,“Roofing”,“Pest Control”,“Mechanical”,“Refrigeration”,“General”].map(c=><option key={c}>{c}</option>)}</Sel></div>
<div><Lbl>Priority</Lbl><Sel style={iS} value={f.priority} onChange={e=>set(“priority”,e.target.value)}>{Object.entries(PRIORITY_SLA).map(([k,v])=><option key={k} value={k}>{k} – {v.desc}</option>)}</Sel></div>
</div>
{!f.siteKey&&<div><Lbl>Location (manual)</Lbl><Inp style={iS} value={f.location} onChange={e=>set(“location”,e.target.value)} placeholder=“Site address…”/></div>}
<div><Lbl>Description</Lbl><TA style={iS} rows={3} value={f.description} onChange={e=>set(“description”,e.target.value)} placeholder=“Fault / works description…”/></div>
{f.priority&&<div style={{background:”#080f20”,border:`1px solid ${(PRIORITY_SLA[f.priority] ? PRIORITY_SLA[f.priority].color : '#94a3b8')}44`,borderRadius:7,padding:“9px 12px”,fontSize:11,color:(PRIORITY_SLA[f.priority] ? PRIORITY_SLA[f.priority].color : ‘#94a3b8’)}}>⏱ {f.priority}: {(PRIORITY_SLA[f.priority] ? PRIORITY_SLA[f.priority].desc : ‘’)}</div>}
<Btn style={{width:“100%”,padding:11,fontSize:13}} onClick={submit}>Log Job</Btn>
</div>
</Card>
</div>
);
